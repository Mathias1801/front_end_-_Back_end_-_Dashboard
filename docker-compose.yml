version: "3.9"

services:

  api:
    build: .
    container_name: aurum_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=sqlite:///./aurum_tempus.db
    restart: unless-stopped

  dashboard:
    build: .
    container_name: aurum_dashboard
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=sqlite:///./aurum_tempus.db
    depends_on:
      - api
    restart: unless-stopped
